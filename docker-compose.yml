services:
  mongodb:
    image: mongo:8.0
    container_name: tuubaa-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: tuubaa
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      target: bot
    container_name: tuubaa-bot
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      LOG_DEBUG: ${LOG_DEBUG:-false}
      MONGO_DB: tuubaa
      MONGO_URI: mongodb://mongodb:27017
    volumes:
      - ./assets:/app/assets:ro